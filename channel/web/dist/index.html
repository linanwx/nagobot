    </div>

    <script>
      // ── State ──────────────────────────────────────────────
      let ws = null;
      let retryCount = 0;
      let currentSession = null;
      let sessions = [];
      let sessionRefreshTimer = null;
      let userAtBottom = true;
      let allMessages = [];       // All messages for current session
      const PAGE_SIZE = 200;      // Messages per page
      let renderedStart = 0;      // Index into allMessages of earliest rendered message
      let loadingOlder = false;   // Guard against concurrent loads

      // ── DOM refs ───────────────────────────────────────────
      const $ = (id) => document.getElementById(id);
      const connDot = $("connDot");
      const connText = $("connText");
      const sessionList = $("sessionList");
      const inspectorSession = $("inspectorSession");
      const messagesContainer = $("messagesContainer");
      const messagesEmpty = $("messagesEmpty");
      const statsBar = $("statsBar");
      const tokenBreakdown = $("tokenBreakdown");
      const chatInput = $("chatInput");
      const sendBtn = $("sendBtn");
      const configBtn = $("configBtn");
      const configModal = $("configModal");
      const configClose = $("configClose");
      const configBody = $("configBody");
      const heartbeatBtn = $("heartbeatBtn");
      const heartbeatModal = $("heartbeatModal");
      const heartbeatClose = $("heartbeatClose");
      const heartbeatBody = $("heartbeatBody");
      const resizeHandle = $("resizeHandle");
      const mainEl = document.querySelector(".main");

      // ── Sidebar resize ───────────────────────────────────
      {
        const MIN_W = 160, MAX_W = 500;
        const saved = localStorage.getItem("sidebar-width");
        if (saved) mainEl.style.setProperty("--sidebar-width", saved + "px");

        let dragging = false;
        resizeHandle.addEventListener("mousedown", (e) => {
          e.preventDefault();
          dragging = true;
          resizeHandle.classList.add("active");
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
        });
        document.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          const w = Math.min(MAX_W, Math.max(MIN_W, e.clientX));
          mainEl.style.setProperty("--sidebar-width", w + "px");
        });
        document.addEventListener("mouseup", () => {
          if (!dragging) return;
          dragging = false;
          resizeHandle.classList.remove("active");
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
          const w = getComputedStyle(mainEl).getPropertyValue("--sidebar-width").trim();
          localStorage.setItem("sidebar-width", parseInt(w));
        });
      }

      // ── Utility functions ──────────────────────────────────

      function escapeHTML(str) {
        if (!str) return "";
        const el = document.createElement("span");
        el.textContent = str;
        return el.innerHTML;
      }

      function timeAgo(dateStr) {
        if (!dateStr) return "";
        const d = new Date(dateStr);
        if (isNaN(d.getTime()) || d.getFullYear() <= 1) return "";
        const diff = Date.now() - d.getTime();
        if (diff < 0) return "just now";
        const s = Math.floor(diff / 1000);
        if (s < 60) return s + "s ago";
        const m = Math.floor(s / 60);
        if (m < 60) return m + "m ago";
        const h = Math.floor(m / 60);
        if (h < 24) return h + "h ago";
        const days = Math.floor(h / 24);
        return days + "d ago";
      }

      function formatTime(timestamp) {
        if (!timestamp) return "";
        const d = new Date(timestamp);
        if (isNaN(d.getTime())) return "";
        const time = d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        const now = new Date();
        if (d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate()) {
          return time;
        }
        const date = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
        return date + " " + time;
      }

      function formatJSON(str) {
        if (!str) return "";
        try {
          return JSON.stringify(JSON.parse(str), null, 2);
        } catch {
          return str;
        }
      }

      // Parse YAML frontmatter messages (wake and system messages).
      // Returns { fields: {key:val}, _message: "body" } or null.
      // Append text to parent, with truncation + Show more if > 500 chars.
      function appendTruncated(parent, text, className) {
        const el = document.createElement("div");
        el.className = className || "msg-body";
        el.textContent = text;
        parent.appendChild(el);
        if (text.length > 500) {
          el.classList.add("msg-body-truncated");
          const btn = document.createElement("button");
          btn.className = "show-more-btn";
          btn.textContent = "Show more";
          let expanded = false;
          btn.addEventListener("click", () => {
            expanded = !expanded;
            el.classList.toggle("msg-body-truncated", !expanded);
            btn.textContent = expanded ? "Show less" : "Show more";
          });
          parent.appendChild(btn);
        }
      }

      function parseFrontmatter(content) {
        if (!content || !content.startsWith("---\n")) return null;
        try {
          let endIdx = content.indexOf("\n---\n", 4);
          let fmOnly = false;
          if (endIdx < 0) {
            // Handle frontmatter-only content ending with "\n---" (no trailing newline)
            if (content.endsWith("\n---")) {
              endIdx = content.length - 4;
              fmOnly = true;
            } else {
              return null;
            }
          }

          const yamlBlock = content.substring(4, endIdx);
          const body = fmOnly ? "" : content.substring(endIdx + 5).trim();

          const fields = {};
          const lines = yamlBlock.split("\n");
          let i = 0;
          while (i < lines.length) {
            const line = lines[i];
            // Skip continuation lines — the block-literal branch consumes them.
            if (/^\s/.test(line)) { i++; continue; }
            const colonIdx = line.indexOf(":");
            if (colonIdx < 0) { i++; continue; }
            const key = line.substring(0, colonIdx).trim();
            let val = line.substring(colonIdx + 1).trim();

            // YAML block scalar indicator ( | |- |+ > >- >+ ): collect indented continuation lines.
            if (/^[|>][+-]?$/.test(val)) {
              const collected = [];
              let baseIndent = null;
              let j = i + 1;
              while (j < lines.length) {
                const next = lines[j];
                if (next === "") { collected.push(""); j++; continue; }
                const m = next.match(/^(\s+)/);
                if (!m) break;
                if (baseIndent === null) baseIndent = m[1].length;
                if (m[1].length < baseIndent) break;
                collected.push(next.substring(baseIndent));
                j++;
              }
              while (collected.length && collected[collected.length - 1] === "") collected.pop();
              if (key) fields[key] = collected.join("\n");
              i = j;
              continue;
            }

            // Strip surrounding quotes
            if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
              val = val.slice(1, -1);
            }
            if (key) fields[key] = val;
            i++;
          }

          if (body) fields._message = body;

          return Object.keys(fields).length > 0 ? fields : null;
        } catch {
          return null;
        }
      }

      function fmtTok(n) {
        if (!n || n <= 0) return "0";
        return n >= 1000 ? (n / 1000).toFixed(1) + "k" : String(n);
      }

      // createCollapsibleBanner builds a collapsible banner element with arrow toggle.
      // Returns the banner DOM element, or null if not created.
      function createCollapsibleBanner(opts) {
        const banner = document.createElement("div");
        banner.className = "system-prompt-banner" + (opts.extraClass ? " " + opts.extraClass : "");
        const hdr = document.createElement("div");
        hdr.className = "system-prompt-header";
        const arrow = document.createElement("span");
        arrow.className = "system-prompt-arrow";
        arrow.textContent = "\u25B8";
        const label = document.createElement("span");
        label.className = "system-prompt-label";
        label.textContent = opts.label;
        hdr.appendChild(arrow);
        hdr.appendChild(label);
        const body = document.createElement("div");
        body.className = "system-prompt-body";
        const pre = document.createElement("pre");
        pre.textContent = opts.content;
        body.appendChild(pre);
        hdr.addEventListener("click", () => {
          const open = body.classList.contains("open");
          body.classList.toggle("open", !open);
          arrow.classList.toggle("open", !open);
        });
        banner.appendChild(hdr);
        banner.appendChild(body);
        return banner;
      }
      function tokColorClass(n) {
        if (n < 300) return "tok-low";
        if (n < 800) return "tok-mid";
        if (n < 3000) return "tok-high";
        return "tok-huge";
      }

      const breakdownColors = [
        "var(--accent-blue)", "var(--accent-green)", "var(--accent-amber)",
        "var(--accent-purple)", "var(--accent-cyan)", "var(--accent-red)",
        "#f472b6", "#a3e635", "#38bdf8", "#fb923c",
      ];

      function renderTokenBreakdown(bd, totalTokens) {
        tokenBreakdown.innerHTML = "";
        const toggle = document.createElement("button");
        toggle.className = "token-breakdown-toggle";
        toggle.innerHTML = "\u25B6 Token Breakdown";
        const content = document.createElement("div");
        content.className = "token-breakdown-content";

        toggle.addEventListener("click", () => {
          const open = content.classList.contains("open");
          content.classList.toggle("open", !open);
          toggle.innerHTML = (open ? "\u25B6" : "\u25BC") + " Token Breakdown";
        });

        const total = totalTokens || 1;

        // By Source
        if (bd.by_source && Object.keys(bd.by_source).length > 0) {
          content.appendChild(renderBreakdownSection("By Source", bd.by_source, total));
        }

        // By Role
        if (bd.by_role && Object.keys(bd.by_role).length > 0) {
          content.appendChild(renderBreakdownSection("By Role", bd.by_role, total));
        }

        // Compression
        if (bd.compression) {
          const sec = document.createElement("div");
          sec.className = "token-breakdown-section";
          const title = document.createElement("div");
          title.className = "token-breakdown-section-title";
          title.textContent = "Compression";
          sec.appendChild(title);

          const c = bd.compression;
          const saved = (c.raw_tokens || 0) - (c.compressed_tokens || 0);
          const savedPct = c.raw_tokens > 0 ? ((saved / c.raw_tokens) * 100).toFixed(1) : "0.0";
          const entries = [
            ["Raw", fmtTok(c.raw_tokens)],
            ["Compressed", fmtTok(c.compressed_tokens)],
            ["Saved", fmtTok(saved) + " (" + savedPct + "%)"],
          ];
          for (const [lbl, val] of entries) {
            const row = document.createElement("div");
            row.className = "compression-stat";
            const l = document.createElement("span"); l.className = "cs-label"; l.textContent = lbl + ":";
            const v = document.createElement("span"); v.textContent = val;
            row.appendChild(l); row.appendChild(v);
            sec.appendChild(row);
          }
          content.appendChild(sec);
        }

        tokenBreakdown.appendChild(toggle);
        tokenBreakdown.appendChild(content);
      }

      function renderBreakdownSection(title, data, total) {
        const sec = document.createElement("div");
        sec.className = "token-breakdown-section";
        const t = document.createElement("div");
        t.className = "token-breakdown-section-title";
        t.textContent = title;
        sec.appendChild(t);

        const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
        sorted.forEach(([name, tokens], i) => {
          const pct = total > 0 ? (tokens / total) * 100 : 0;
          const row = document.createElement("div");
          row.className = "token-breakdown-row";

          const nm = document.createElement("span");
          nm.className = "token-breakdown-name";
          nm.textContent = name;

          const tk = document.createElement("span");
          tk.className = "token-breakdown-tokens";
          tk.textContent = fmtTok(tokens);

          const pc = document.createElement("span");
          pc.className = "token-breakdown-pct";
          pc.textContent = pct.toFixed(1) + "%";

          const barBg = document.createElement("div");
          barBg.className = "token-breakdown-bar-bg";
          const barFill = document.createElement("div");
          barFill.className = "token-breakdown-bar-fill";
          barFill.style.width = Math.min(pct, 100).toFixed(1) + "%";
          barFill.style.background = breakdownColors[i % breakdownColors.length];
          barBg.appendChild(barFill);

          row.appendChild(nm);
          row.appendChild(tk);
          row.appendChild(pc);
          row.appendChild(barBg);
          sec.appendChild(row);
        });

        return sec;
      }

      function truncateId(id) {
        if (!id) return "";
        if (id.length <= 20) return id;
        return id.slice(0, 8) + "..." + id.slice(-8);
      }

      // ── Auto-resize textarea ───────────────────────────────
      chatInput.addEventListener("input", () => {
        chatInput.style.height = "auto";
        chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + "px";
      });

      // ── Scroll tracking ────────────────────────────────────
      messagesContainer.addEventListener("scroll", () => {
        const el = messagesContainer;
        userAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
      });

      function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }

      // ── WebSocket ──────────────────────────────────────────

      function setConnStatus(state) {
        connDot.className = "conn-dot " + state;
        if (state === "connected") {
          connText.textContent = "Connected";
        } else if (state === "reconnecting") {
          connText.textContent = "Reconnecting";
        } else {
          connText.textContent = "Disconnected";
        }
      }

      function connectWS() {
        const proto = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(proto + "://" + location.host + "/ws");

        ws.onopen = () => {
          retryCount = 0;
          setConnStatus("connected");
          updateInputState();
          if (currentSession) {
            ws.send(JSON.stringify({ type: "bind", session_id: currentSession }));
          }
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === "response" && msg.text && currentSession) {
              appendLiveMessage(msg.text);
            }
          } catch { /* ignore non-JSON */ }
        };

        ws.onclose = () => {
          setConnStatus("reconnecting");
          updateInputState();
          const delay = Math.min(1000 * Math.pow(2, retryCount++), 10000);
          setTimeout(connectWS, delay);
        };

        ws.onerror = () => {
          ws.close();
        };
      }

      function appendLiveMessage(text) {
        const msg = {
          role: "assistant",
          content: text,
          timestamp: new Date().toISOString()
        };
        const card = renderMessageCard(msg);
        messagesEmpty.style.display = "none";
        messagesContainer.appendChild(card);
        if (userAtBottom) scrollToBottom();
      }

      // ── Sessions ───────────────────────────────────────────

      async function loadSessions() {
        try {
          const res = await fetch("/api/sessions");
          if (!res.ok) return;
          sessions = await res.json();
          renderSessionList();
          updateHeartbeatBtn();
        } catch { /* silent */ }
      }

      // Track collapsed state by tree path (persisted across re-renders)
      const collapsedPaths = new Set();
      let treeInitialized = false;
      let treeAutoExpanded = false;

      // Build a tree from flat session keys split on ":"
      function buildSessionTree(sessions) {
        const root = { children: new Map(), session: null };
        for (const s of sessions) {
          const segments = s.key.split(":");
          let node = root;
          for (const seg of segments) {
            if (!node.children.has(seg)) {
              node.children.set(seg, { children: new Map(), session: null });
            }
            node = node.children.get(seg);
          }
          node.session = s;
        }
        return root;
      }

      // Count total session leaves under a node
      function countLeaves(node) {
        let n = node.session ? 1 : 0;
        for (const child of node.children.values()) {
          n += countLeaves(child);
        }
        return n;
      }

      function renderSessionList() {
        sessionList.innerHTML = "";
        if (!sessions || sessions.length === 0) {
          sessionList.innerHTML = '<div style="padding:12px;color:var(--text-tertiary);font-size:12px;">No sessions</div>';
          return;
        }

        const tree = buildSessionTree(sessions);

        // On first render, collapse everything at depth >= 2
        if (!treeInitialized) {
          (function initCollapse(node, path, depth) {
            for (const [name, child] of node.children) {
              const childPath = path ? path + ":" + name : name;
              if (child.children.size > 0 && depth >= 1) {
                collapsedPaths.add(childPath);
              }
              initCollapse(child, childPath, depth + 1);
            }
          })(tree, "", 0);
          treeInitialized = true;
        }

        // Auto-expand path to currentSession only on first render
        if (!treeAutoExpanded && currentSession) {
          treeAutoExpanded = true;
          const segs = currentSession.split(":");
          let p = "";
          for (const seg of segs) {
            p = p ? p + ":" + seg : seg;
            collapsedPaths.delete(p);
          }
        }

        renderTreeNode(tree, "", 0, sessionList);
      }

      function renderTreeNode(node, parentPath, depth, container) {
        for (const [name, child] of node.children) {
          const path = parentPath ? parentPath + ":" + name : name;
          const hasChildren = child.children.size > 0;

          if (hasChildren) {
            // Render as collapsible group (may also be a session itself)
            container.appendChild(makeGroup(name, path, child, depth));
          } else if (child.session) {
            // Pure leaf — render as item
            container.appendChild(makeSessionItem(child.session, name));
          }
        }
      }

      function makeGroup(name, path, node, depth) {
        const isCollapsed = collapsedPaths.has(path);
        const hasSession = !!node.session;

        const group = document.createElement("div");
        group.className = "session-group" + (isCollapsed ? " collapsed" : "");

        // Header
        const header = document.createElement("div");
        header.className = "session-group-header" + (hasSession ? " has-session" : "");
        if (hasSession && currentSession === node.session.key) {
          header.classList.add("active");
        }
        header.setAttribute("data-depth", depth);
        header.title = path;

        const arrow = document.createElement("span");
        arrow.className = "session-group-arrow";
        arrow.textContent = isCollapsed ? "+" : "\u2212";

        const contentEl = document.createElement("div");
        contentEl.className = "session-group-content";

        // Title row: name + meta
        const titleRow = document.createElement("div");
        titleRow.className = "session-group-title-row";

        const nameEl = document.createElement("span");
        nameEl.className = "session-group-name";
        nameEl.textContent = name;
        titleRow.appendChild(nameEl);

        const metaEl = document.createElement("span");
        metaEl.className = "session-group-meta";

        if (hasSession && node.session.message_count != null) {
          const mc = document.createElement("span");
          mc.className = "session-group-msg-count";
          mc.textContent = node.session.message_count;
          metaEl.appendChild(mc);
        }

        const countEl = document.createElement("span");
        countEl.className = "session-group-count";
        const leaves = countLeaves(node) - (hasSession ? 1 : 0);
        if (leaves > 0) countEl.textContent = "+" + leaves;
        metaEl.appendChild(countEl);

        if (hasSession) {
          const timeEl = document.createElement("span");
          timeEl.className = "session-group-time";
          timeEl.textContent = timeAgo(node.session.updated_at);
          metaEl.appendChild(timeEl);
        }

        titleRow.appendChild(metaEl);
        contentEl.appendChild(titleRow);

        // Summary row
        if (hasSession && node.session.summary) {
          const summaryEl = document.createElement("div");
          summaryEl.className = "session-summary";
          summaryEl.textContent = node.session.summary;
          summaryEl.title = node.session.summary;
          contentEl.appendChild(summaryEl);
        }

        header.appendChild(arrow);
        header.appendChild(contentEl);

        // Click: select session on first click, toggle collapse on second click or arrow
        function toggleCollapse() {
          if (collapsedPaths.has(path)) {
            collapsedPaths.delete(path);
          } else {
            collapsedPaths.add(path);
          }
          group.classList.toggle("collapsed");
          arrow.textContent = collapsedPaths.has(path) ? "+" : "\u2212";
        }
        header.addEventListener("click", (e) => {
          const clickedArrow = e.target === arrow;
          if (hasSession && !clickedArrow) {
            if (currentSession === node.session.key) {
              toggleCollapse();
            } else {
              selectSession(node.session.key);
            }
          } else {
            toggleCollapse();
          }
        });

        group.appendChild(header);

        // Children
        const childrenEl = document.createElement("div");
        childrenEl.className = "session-group-children";
        renderTreeNode(node, path, depth + 1, childrenEl);
        group.appendChild(childrenEl);

        return group;
      }

      function makeSessionItem(s, displayName) {
        const item = document.createElement("div");
        item.className = "session-item" + (currentSession === s.key ? " active" : "");
        item.setAttribute("role", "button");
        item.setAttribute("tabindex", "0");
        item.setAttribute("aria-label", "Session " + s.key);

        // Spacer matching the +/- arrow width in group headers.
        const spacer = document.createElement("span");
        spacer.className = "session-item-spacer";
        item.appendChild(spacer);

        const contentEl = document.createElement("div");
        contentEl.className = "session-item-content";

        // Title row: key + meta
        const titleRow = document.createElement("div");
        titleRow.className = "session-item-title-row";

        const keyEl = document.createElement("span");
        keyEl.className = "session-key";
        keyEl.textContent = displayName || s.key;
        keyEl.title = s.key;
        titleRow.appendChild(keyEl);

        const metaEl = document.createElement("span");
        metaEl.className = "session-meta";

        if (s.message_count != null) {
          const countEl = document.createElement("span");
          countEl.className = "session-count";
          countEl.textContent = s.message_count;
          metaEl.appendChild(countEl);
        }

        const timeEl = document.createElement("span");
        timeEl.className = "session-time";
        timeEl.textContent = timeAgo(s.updated_at);
        metaEl.appendChild(timeEl);

        titleRow.appendChild(metaEl);
        contentEl.appendChild(titleRow);

        // Summary row
        if (s.summary) {
          const summaryEl = document.createElement("div");
          summaryEl.className = "session-summary";
          summaryEl.textContent = s.summary;
          summaryEl.title = s.summary;
          contentEl.appendChild(summaryEl);
        }

        item.appendChild(contentEl);

        item.addEventListener("click", () => selectSession(s.key));
        item.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            selectSession(s.key);
          }
        });

        return item;
      }

      async function selectSession(key) {
        if (currentSession === key) return;
        if (typeof closeMobileSidebar === "function") closeMobileSidebar();
        currentSession = key;
        inspectorSession.textContent = "session: " + key;
        chatInput.placeholder = "Send a message to " + key + "...";
        updateInputState();
        renderSessionList();
        updateHeartbeatBtn();

        // Bind WebSocket
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "bind", session_id: key }));
        }

        // Load messages
        await loadMessages(key);
      }

      async function loadMessages(key) {
        messagesContainer.innerHTML = "";
        messagesEmpty.style.display = "flex";
        messagesEmpty.textContent = "Loading...";

        try {
          const res = await fetch("/api/sessions/" + key.split(":").map(encodeURIComponent).join("/"));
          if (!res.ok) {
            messagesEmpty.textContent = "Failed to load session: HTTP " + res.status;
            return;
          }
          const data = await res.json();
          const msgs = data.messages || [];

          messagesContainer.innerHTML = "";
          if (msgs.length === 0) {
            messagesEmpty.style.display = "flex";
            messagesEmpty.textContent = "No messages in this session";
            messagesContainer.appendChild(messagesEmpty);
            return;
          }

          messagesEmpty.style.display = "none";

          // Fetch system prompt (non-blocking, best-effort)
          const sessionPath = "/api/sessions/" + key.split(":").map(encodeURIComponent).join("/");
          fetch(sessionPath + "/system-prompt")
            .then(r => r.ok ? r.json() : null)
            .then(sp => {
              if (sp && sp.available && sp.prompt && currentSession === key) {
                const existing = messagesContainer.querySelector(".sp-banner");
                if (existing) existing.remove();
                const tokStr = sp.tokens > 0 ? fmtTok(sp.tokens) + " tok" : "";
                const banner = createCollapsibleBanner({
                  extraClass: "sp-banner",
                  label: "System Prompt (live)" + (tokStr ? "  \u00B7  " + tokStr : ""),
                  content: sp.prompt,
                });
                messagesContainer.insertBefore(banner, messagesContainer.firstChild);
              }
            })
            .catch(() => {});

          // Fetch tool definitions (non-blocking, best-effort)
          fetch(sessionPath + "/tools")
            .then(r => r.ok ? r.json() : null)
            .then(td => {
              if (td && td.available && td.tools && td.tools.length > 0 && currentSession === key) {
                const existing = messagesContainer.querySelector(".td-banner");
                if (existing) existing.remove();
                const tokStr = td.tokens > 0 ? fmtTok(td.tokens) + " tok" : "";
                const banner = createCollapsibleBanner({
                  extraClass: "td-banner",
                  label: "Tool Definitions (live)  \u00B7  " + td.count + " tools" + (tokStr ? "  \u00B7  " + tokStr : ""),
                  content: JSON.stringify(td.tools, null, 2),
                });
                const spBanner = messagesContainer.querySelector(".sp-banner");
                if (spBanner && spBanner.nextSibling) {
                  messagesContainer.insertBefore(banner, spBanner.nextSibling);
                } else {
                  messagesContainer.insertBefore(banner, messagesContainer.firstChild);
                }
              }
            })
            .catch(() => {});

          // Fetch session stats (non-blocking, best-effort)
          fetch("/api/sessions/" + key.split(":").map(encodeURIComponent).join("/") + "/stats")
            .then(r => r.ok ? r.json() : null)
            .then(st => {
              if (!st || currentSession !== key) {
                statsBar.classList.remove("visible");
                tokenBreakdown.classList.remove("visible");
                return;
              }
              statsBar.innerHTML = "";
              tokenBreakdown.innerHTML = "";

              const threadRunning = st.is_runtime === true;

              const items = [
                ["ctx", threadRunning ? fmtTok(st.compressed_tokens) + "/" + fmtTok(st.context_window_tokens) : fmtTok(st.compressed_tokens)],
                ["msgs", st.message_count],
                ["saved", fmtTok(st.tokens_saved)],
              ];
              for (const [label, value] of items) {
                const el = document.createElement("span");
                el.className = "stats-item";
                const l = document.createElement("span"); l.className = "stats-label"; l.textContent = label;
                const v = document.createElement("span"); v.className = "stats-value"; v.textContent = value;
                el.appendChild(l); el.appendChild(v);
                statsBar.appendChild(el);
              }

              if (threadRunning) {
                const bar = document.createElement("div"); bar.className = "stats-bar-fill";
                const progress = document.createElement("div");
                progress.className = "stats-bar-progress " + st.pressure_status;
                progress.style.width = Math.min(st.usage_percent, 100).toFixed(1) + "%";
                bar.appendChild(progress);

                // Compression trigger markers (Tier 2 AI compress, Tier 3 pressure hook).
                const appendTick = (pctVal, klass, label) => {
                  if (!(pctVal > 0 && pctVal < 100)) return;
                  const tick = document.createElement("div");
                  tick.className = "stats-bar-tick " + klass;
                  tick.style.left = pctVal.toFixed(2) + "%";
                  const tokens = Math.round(st.context_window_tokens * pctVal / 100);
                  tick.title = label + " @ " + pctVal.toFixed(0) + "% (" +
                    fmtTok(tokens) + "/" + fmtTok(st.context_window_tokens) + ")";
                  bar.appendChild(tick);
                };
                appendTick(st.tier2_trigger_percent, "tier2", "Trim 2 (AI compress)");
                appendTick(st.tier3_trigger_percent, "tier3", "Trim 3 (pressure hook)");

                statsBar.appendChild(bar);
                const pct = document.createElement("span");
                pct.className = "stats-item stats-value";
                pct.textContent = st.usage_percent.toFixed(1) + "%";
                statsBar.appendChild(pct);
              } else {
                const nr = document.createElement("span");
                nr.className = "stats-not-running";
                nr.textContent = "thread not running";
                statsBar.appendChild(nr);
              }

              statsBar.classList.add("visible");

              // Token Breakdown panel
              if (st.token_breakdown) {
                renderTokenBreakdown(st.token_breakdown, st.compressed_tokens);
                tokenBreakdown.classList.add("visible");
              } else {
                tokenBreakdown.classList.remove("visible");
              }
            })
            .catch(() => { statsBar.classList.remove("visible"); tokenBreakdown.classList.remove("visible"); });

          // Pagination: render last PAGE_SIZE, load older on demand
          allMessages = msgs;
          renderedStart = Math.max(0, msgs.length - PAGE_SIZE);
          const renderMsgs = msgs.slice(renderedStart);

          if (renderedStart > 0) {
            messagesContainer.appendChild(createLoadOlderBtn());
          }

          const fragment = document.createDocumentFragment();
          for (const msg of renderMsgs) {
            fragment.appendChild(renderMessageCard(msg));
          }
          messagesContainer.appendChild(fragment);

          userAtBottom = true;
          scrollToBottom();
        } catch (err) {
          messagesEmpty.textContent = "Error loading session: " + err.message;
        }
      }

      // ── Pagination helpers ─────────────────────────────────

      function createLoadOlderBtn() {
        const btn = document.createElement("div");
        btn.className = "load-older-btn";
        btn.textContent = "Load older messages (" + renderedStart + " remaining)";
        btn.addEventListener("click", loadOlderMessages);
        return btn;
      }

      function loadOlderMessages() {
        if (loadingOlder || renderedStart <= 0) return;
        loadingOlder = true;

        const prevEnd = renderedStart;
        renderedStart = Math.max(0, renderedStart - PAGE_SIZE);
        const olderMsgs = allMessages.slice(renderedStart, prevEnd);

        // Remove existing "Load older" button
        const oldBtn = messagesContainer.querySelector(".load-older-btn");

        // Preserve scroll position: measure before insert
        const scrollH = messagesContainer.scrollHeight;
        const scrollT = messagesContainer.scrollTop;

        const fragment = document.createDocumentFragment();
        for (const msg of olderMsgs) {
          fragment.appendChild(renderMessageCard(msg));
        }

        // Insert older messages after the button (or at start)
        const insertBefore = oldBtn ? oldBtn.nextSibling : messagesContainer.firstChild;
        messagesContainer.insertBefore(fragment, insertBefore);

        // Update or remove button
        if (oldBtn) {
          if (renderedStart > 0) {
            oldBtn.textContent = "Load older messages (" + renderedStart + " remaining)";
          } else {
            oldBtn.remove();
          }
        }

        // Restore scroll position
        const newScrollH = messagesContainer.scrollHeight;
        messagesContainer.scrollTop = scrollT + (newScrollH - scrollH);

        loadingOlder = false;
      }

      // ── Message rendering ──────────────────────────────────

      function renderMessageCard(msg) {
        const card = document.createElement("div");
        card.className = "msg-card" + (msg.heartbeat_trim ? " heartbeat-trim" : "");
        card.setAttribute("data-role", msg.role || "system");

        // Header
        const header = document.createElement("div");
        header.className = "msg-header";

        // Role badge
        const roleBadge = document.createElement("span");
        roleBadge.className = "role-badge " + (msg.role || "system");
        roleBadge.textContent = msg.role || "unknown";
        header.appendChild(roleBadge);

        // Timestamp
        if (msg.timestamp) {
          const ts = document.createElement("span");
          ts.className = "msg-timestamp";
          ts.textContent = formatTime(msg.timestamp);
          ts.title = msg.timestamp;
          header.appendChild(ts);
        }

        // Source badge
        if (msg.source) {
          const src = document.createElement("span");
          src.className = "source-badge";
          src.textContent = msg.source;
          header.appendChild(src);
        }

        // Heartbeat trim badge
        if (msg.heartbeat_trim) {
          const hbt = document.createElement("span");
          hbt.className = "heartbeat-trim-badge";
          hbt.textContent = "trimmed";
          header.appendChild(hbt);
        }

        // Tool name for tool results
        if (msg.role === "tool" && msg.name) {
          const tn = document.createElement("span");
          tn.className = "tool-name-badge";
          tn.textContent = msg.name;
          header.appendChild(tn);
        }

        // Compressed badge — default to showing compressed (what the bot sees)
        if (msg.compressed) {
          const cb = document.createElement("span");
          cb.className = "compressed-badge";
          cb.textContent = "original";
          cb.title = "Click to toggle original/compressed view";
          header.appendChild(cb);

          let showingOriginal = false;
          cb.addEventListener("click", () => {
            showingOriginal = !showingOriginal;
            const bodyEl = card.querySelector(".msg-body");
            if (bodyEl) {
              bodyEl.textContent = showingOriginal ? (msg.content || "") : msg.compressed;
              cb.textContent = showingOriginal ? "compressed" : "original";
            }
          });
        }

        // Rephrase badge — toggle between rephrased and original content
        if (msg.original_content) {
          const rb = document.createElement("span");
          rb.className = "compressed-badge";
          rb.textContent = "original";
          rb.title = "Click to toggle rephrased/original view";
          rb.style.background = "#6366f1";
          header.appendChild(rb);

          let showingOrig = false;
          rb.addEventListener("click", () => {
            showingOrig = !showingOrig;
            const bodyEl = card.querySelector(".msg-body");
            if (bodyEl) {
              bodyEl.textContent = showingOrig ? msg.original_content : (msg.compressed || msg.content || "");
              rb.textContent = showingOrig ? "rephrased" : "original";
            }
          });
        }

        // Message ID
        if (msg.id) {
          const idEl = document.createElement("span");
          idEl.className = "msg-id";
          idEl.textContent = msg.id;
          header.appendChild(idEl);
        }

        // Token estimate (from backend tiktoken)
        if (msg.tokens > 0) {
          const tokEl = document.createElement("span");
          tokEl.className = "token-badge";
          if (msg.compressed_tokens && msg.compressed_tokens !== msg.tokens) {
            const cSpan = document.createElement("span");
            cSpan.className = tokColorClass(msg.compressed_tokens);
            cSpan.textContent = fmtTok(msg.compressed_tokens);
            const sep = document.createTextNode("/");
            const oSpan = document.createElement("span");
            oSpan.className = tokColorClass(msg.tokens);
            oSpan.textContent = fmtTok(msg.tokens);
            tokEl.appendChild(cSpan);
            tokEl.appendChild(sep);
            tokEl.appendChild(oSpan);
            tokEl.appendChild(document.createTextNode(" tok"));
          } else {
            tokEl.className += " " + tokColorClass(msg.tokens);
            tokEl.textContent = fmtTok(msg.tokens) + " tok";
          }
          header.appendChild(tokEl);
        }

        card.appendChild(header);

        // Body — show compressed content by default (what the bot sees)
        const displayContent = msg.compressed || msg.content || "";
        const content = displayContent;
        const fmData = parseFrontmatter(content);

        if (fmData) {
          const body = document.createElement("div");
          body.className = "msg-body wake-view";

          const fields = document.createElement("div");
          fields.className = "wake-fields";

          // Render all frontmatter fields except _message
          for (const [key, val] of Object.entries(fmData)) {
            if (key === "_message") continue;
            const label = document.createElement("span");
            label.className = "wake-label";
            label.textContent = key;

            const value = document.createElement("span");
            value.className = "wake-value";
            value.textContent = val;

            fields.appendChild(label);
            fields.appendChild(value);
          }
          body.appendChild(fields);

          if (fmData._message) {
            // Check if body itself has frontmatter (nested system message)
            const nested = parseFrontmatter(fmData._message);
            if (nested) {
              const sysFields = document.createElement("div");
              sysFields.className = "wake-fields";
              for (const [k, val] of Object.entries(nested)) {
                if (k === "_message") continue;
                const l = document.createElement("span"); l.className = "wake-label"; l.textContent = k;
                const v = document.createElement("span"); v.className = "wake-value"; v.textContent = val;
                sysFields.appendChild(l); sysFields.appendChild(v);
              }
              body.appendChild(sysFields);
              if (nested._message) {
                appendTruncated(body, nested._message, "wake-message");
              }
            } else {
              appendTruncated(body, fmData._message, "wake-message");
            }
          }

          card.appendChild(body);
        } else if (content) {
          appendTruncated(card, content, "msg-body");
        }

        // Reasoning section
        if (msg.reasoning_content) {
          const badge = msg.reasoning_trimmed
            ? { text: "trimmed", cls: "trimmed", title: "This reasoning has been removed from the context sent to the model (original preserved for inspection only)" }
            : null;
          card.appendChild(makeCollapsible("Reasoning", msg.reasoning_content, badge));
        }

        // Tool calls section
        if (msg.tool_calls && msg.tool_calls.length > 0) {
          const names = msg.tool_calls.map(tc => tc.function ? tc.function.name : "unknown").join(", ");
          const section = document.createElement("div");
          section.className = "collapsible";

          const toggle = document.createElement("button");
          toggle.className = "collapsible-toggle";
          toggle.innerHTML = '<span class="collapsible-arrow">&#9654;</span> Tool Calls: ' + escapeHTML(names);
          toggle.addEventListener("click", () => section.classList.toggle("open"));

          const bodyDiv = document.createElement("div");
          bodyDiv.className = "collapsible-body";

          for (const tc of msg.tool_calls) {
            const fn = tc.function || {};
            const item = document.createElement("div");
            item.className = "tool-call-item";

            const nameEl = document.createElement("div");
            nameEl.className = "tool-call-name";
            nameEl.textContent = fn.name || "unknown";
            item.appendChild(nameEl);

            if (fn.arguments) {
              const argsEl = document.createElement("div");
              argsEl.className = "tool-call-args";
              argsEl.textContent = formatJSON(fn.arguments);
              item.appendChild(argsEl);
            }

            bodyDiv.appendChild(item);
          }

          section.appendChild(toggle);
          section.appendChild(bodyDiv);
          card.appendChild(section);
        }

        // Tool call ID reference for tool results
        if (msg.role === "tool" && msg.tool_call_id) {
          const ref = document.createElement("div");
          ref.style.cssText = "padding:4px 10px;font-size:10px;color:var(--text-tertiary);border-top:1px solid var(--border);";
          ref.textContent = "call_id: " + msg.tool_call_id;
          card.appendChild(ref);
        }

        return card;
      }

      function makeCollapsible(title, content, badge) {
        const section = document.createElement("div");
        section.className = "collapsible";

        const toggle = document.createElement("button");
        toggle.className = "collapsible-toggle";
        let html = '<span class="collapsible-arrow">&#9654;</span> ' + escapeHTML(title);
        if (badge) {
          const cls = badge.cls ? " " + escapeHTML(badge.cls) : "";
          const tip = badge.title ? ' title="' + escapeHTML(badge.title) + '"' : "";
          html += '<span class="collapsible-badge' + cls + '"' + tip + '>' + escapeHTML(badge.text) + "</span>";
        }
        toggle.innerHTML = html;
        toggle.addEventListener("click", () => section.classList.toggle("open"));

        const bodyDiv = document.createElement("div");
        bodyDiv.className = "collapsible-body";

        const contentDiv = document.createElement("div");
        contentDiv.className = "collapsible-content";
        contentDiv.textContent = content;

        bodyDiv.appendChild(contentDiv);
        section.appendChild(toggle);
        section.appendChild(bodyDiv);
        return section;
      }

      // ── Input / Send ───────────────────────────────────────

      function updateInputState() {
        const connected = ws && ws.readyState === WebSocket.OPEN;
        const hasSession = !!currentSession;
        chatInput.disabled = !connected || !hasSession;
        sendBtn.disabled = !connected || !hasSession;
        if (!hasSession) {
          chatInput.placeholder = "Select a session first...";
        } else if (!connected) {
          chatInput.placeholder = "Disconnected...";
        } else {
          chatInput.placeholder = "Send a message to " + currentSession + "...";
        }
      }

      function updateHeartbeatBtn() {
        if (!currentSession) {
          heartbeatBtn.classList.remove("hb-active");
          return;
        }
        const s = sessions.find(s => s.key === currentSession);
        if (s && s.has_heartbeat) {
          heartbeatBtn.classList.add("hb-active");
        } else {
          heartbeatBtn.classList.remove("hb-active");
        }
      }

      function sendMessage() {
        const text = chatInput.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN || !currentSession) return;

        ws.send(JSON.stringify({
          type: "message",
          session_id: currentSession,
          text: text
        }));

        // Show sent message locally
        const localMsg = {
          role: "user",
          content: text,
          timestamp: new Date().toISOString(),
          source: "web"
        };
        messagesEmpty.style.display = "none";
        messagesContainer.appendChild(renderMessageCard(localMsg));
        if (userAtBottom) scrollToBottom();

        chatInput.value = "";
        chatInput.style.height = "auto";
      }

      sendBtn.addEventListener("click", sendMessage);
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // ── Mobile sidebar toggle ─────────────────────────────
      const menuToggle = $("menuToggle");
      const sidebar = document.querySelector(".sidebar");
      let mobileOverlay = null;

      function closeMobileSidebar() {
        sidebar.classList.remove("mobile-open");
        if (mobileOverlay) { mobileOverlay.remove(); mobileOverlay = null; }
      }

      menuToggle.addEventListener("click", () => {
        if (sidebar.classList.contains("mobile-open")) {
          closeMobileSidebar();
        } else {
          sidebar.classList.add("mobile-open");
          mobileOverlay = document.createElement("div");
          mobileOverlay.className = "mobile-overlay";
          mobileOverlay.addEventListener("click", closeMobileSidebar);
          document.querySelector(".main").appendChild(mobileOverlay);
        }
      });

      // ── Config Modal ───────────────────────────────────────

      configBtn.addEventListener("click", async () => {
        configModal.classList.add("open");
        configBody.textContent = "Loading...";
        try {
          const res = await fetch("/api/config");
          if (!res.ok) {
            configBody.textContent = "Failed to load config: HTTP " + res.status;
            return;
          }
          const cfg = await res.json();
          renderConfig(cfg);
        } catch (err) {
          configBody.textContent = "Error: " + err.message;
        }
      });

      function renderConfig(cfg) {
        configBody.innerHTML = "";

        // Helper: render a flat key-value row
        function kvRow(key, val) {
          const row = document.createElement("div");
          row.className = "config-row";
          const k = document.createElement("span");
          k.className = "config-key";
          k.textContent = key;
          const v = document.createElement("span");
          v.className = "config-value";
          if (val === null || val === undefined) { v.textContent = "—"; }
          else if (typeof val === "object") { v.textContent = JSON.stringify(val); }
          else { v.textContent = String(val); }
          row.appendChild(k);
          row.appendChild(v);
          return row;
        }

        // Helper: render an expandable group with nested key-values
        function nestedGroup(label, obj) {
          const wrap = document.createElement("div");
          const lbl = document.createElement("div");
          lbl.className = "config-group-label";
          lbl.textContent = label;
          const nested = document.createElement("div");
          nested.className = "config-nested";
          nested.style.display = "none";
          lbl.addEventListener("click", () => {
            const open = nested.style.display !== "none";
            nested.style.display = open ? "none" : "block";
            lbl.classList.toggle("open", !open);
          });
          if (typeof obj === "object" && obj !== null) {
            for (const [k, v] of Object.entries(obj)) {
              const row = document.createElement("div");
              row.className = "config-row";
              const kEl = document.createElement("span");
              kEl.className = "config-nested-key";
              kEl.textContent = k;
              const vEl = document.createElement("span");
              vEl.className = "config-nested-val";
              vEl.textContent = typeof v === "object" ? JSON.stringify(v) : String(v);
              row.appendChild(kEl);
              row.appendChild(vEl);
              nested.appendChild(row);
            }
          } else {
            nested.textContent = String(obj);
          }
          wrap.appendChild(lbl);
          wrap.appendChild(nested);
          return wrap;
        }

        // Helper: create section with title
        function makeSection(titleText) {
          const section = document.createElement("div");
          section.className = "config-section";
          const t = document.createElement("div");
          t.className = "config-section-title";
          t.textContent = titleText;
          section.appendChild(t);
          return section;
        }

        // ── Thread section ──
        if (cfg.thread) {
          const section = makeSection("Thread");
          for (const [k, v] of Object.entries(cfg.thread)) {
            if (typeof v === "object" && v !== null) {
              section.appendChild(nestedGroup(k, v));
            } else {
              section.appendChild(kvRow(k, v));
            }
          }
          configBody.appendChild(section);
        }

        // ── Channels section ──
        if (cfg.channels) {
          const section = makeSection("Channels");
          for (const [k, v] of Object.entries(cfg.channels)) {
            if (typeof v === "object" && v !== null) {
              section.appendChild(nestedGroup(k, v));
            } else {
              section.appendChild(kvRow(k, v));
            }
          }
          configBody.appendChild(section);
        }

        // ── Cron Jobs section ──
        if (cfg.cron && Array.isArray(cfg.cron) && cfg.cron.length > 0) {
          const section = makeSection("Cron Jobs (" + cfg.cron.length + ")");
          for (const job of cfg.cron) {
            const card = document.createElement("div");
            card.className = "cron-card";

            // Header: ID + badges
            const hdr = document.createElement("div");
            hdr.className = "cron-card-header";
            const idEl = document.createElement("span");
            idEl.className = "cron-card-id";
            idEl.textContent = job.id || "unknown";
            hdr.appendChild(idEl);
            if (job.kind) {
              const b = document.createElement("span");
              b.className = "cron-card-badge";
              b.textContent = job.kind === "at" ? "one-shot" : "recurring";
              hdr.appendChild(b);
            }
            if (job.at_time && job.at_time !== "0001-01-01T00:00:00Z") {
              const b = document.createElement("span");
              b.className = "cron-card-badge";
              b.textContent = new Date(job.at_time).toLocaleString();
              hdr.appendChild(b);
            } else if (job.expr) {
              const b = document.createElement("span");
              b.className = "cron-card-badge";
              b.textContent = job.expr;
              hdr.appendChild(b);
            }
            if (job.agent) {
              const b = document.createElement("span");
              b.className = "cron-card-badge agent";
              b.textContent = job.agent;
              hdr.appendChild(b);
            }
            if (job.silent) {
              const b = document.createElement("span");
              b.className = "cron-card-badge silent";
              b.textContent = "silent";
              hdr.appendChild(b);
            }
            card.appendChild(hdr);

            // Task description
            if (job.task) {
              const task = document.createElement("div");
              task.className = "cron-card-task";
              task.textContent = job.task;
              task.title = job.task;
              card.appendChild(task);
            }

            // Meta: wake_session, created_at
            const meta = document.createElement("div");
            meta.className = "cron-card-meta";
            if (job.wake_session) {
              const s = document.createElement("span");
              s.textContent = "→ " + job.wake_session;
              meta.appendChild(s);
            }
            if (job.created_at && job.created_at !== "0001-01-01T00:00:00Z") {
              const s = document.createElement("span");
              s.textContent = "created " + new Date(job.created_at).toLocaleDateString();
              meta.appendChild(s);
            }
            if (meta.children.length > 0) card.appendChild(meta);

            section.appendChild(card);
          }
          configBody.appendChild(section);
        }

        // ── Other top-level keys ──
        const handled = new Set(["thread", "channels", "cron"]);
        const otherKeys = Object.keys(cfg).filter(k => !handled.has(k));
        if (otherKeys.length > 0) {
          const section = makeSection("Other");
          for (const k of otherKeys) {
            const v = cfg[k];
            if (typeof v === "object" && v !== null) {
              section.appendChild(nestedGroup(k, v));
            } else {
              section.appendChild(kvRow(k, v));
            }
          }
          configBody.appendChild(section);
        }
      }

      // ── Heartbeat Modal ────────────────────────────────────

      heartbeatBtn.addEventListener("click", async () => {
        heartbeatModal.classList.add("open");
        heartbeatBody.textContent = "Loading...";

        // Find all sessions with heartbeat
        const hbSessions = sessions.filter(s => s.has_heartbeat);
        if (hbSessions.length === 0) {
          heartbeatBody.innerHTML = '<div class="heartbeat-empty">No sessions with heartbeat</div>';
          return;
        }

        heartbeatBody.innerHTML = "";

        // Fetch all heartbeats in parallel
        const results = await Promise.allSettled(
          hbSessions.map(s =>
            fetch("/api/heartbeat/" + s.key.split(":").map(encodeURIComponent).join("/"))
              .then(r => r.ok ? r.json() : null)
              .then(d => ({ key: s.key, content: d && d.content ? d.content : "" }))
              .catch(() => ({ key: s.key, content: "" }))
          )
        );

        heartbeatBody.innerHTML = "";
        let hasAny = false;
        for (const r of results) {
          const { key, content } = r.value || r.reason || {};
          if (!content) continue;
          hasAny = true;

          const card = document.createElement("div");
          card.className = "hb-card";

          const hdr = document.createElement("div");
          hdr.className = "hb-card-header";
          const heart = document.createElement("span");
          heart.className = "hb-card-heart";
          heart.textContent = "♥";
          const keyEl = document.createElement("span");
          keyEl.className = "hb-card-key";
          keyEl.textContent = key;
          const arrow = document.createElement("span");
          arrow.className = "hb-card-arrow";
          arrow.textContent = "▸";
          hdr.appendChild(heart);
          hdr.appendChild(keyEl);
          hdr.appendChild(arrow);

          const body = document.createElement("div");
          body.className = "hb-card-body";
          const pre = document.createElement("div");
          pre.className = "heartbeat-content";
          pre.textContent = content;
          body.appendChild(pre);

          hdr.addEventListener("click", () => {
            const open = body.classList.contains("open");
            body.classList.toggle("open", !open);
            arrow.classList.toggle("open", !open);
          });

          card.appendChild(hdr);
          card.appendChild(body);
          heartbeatBody.appendChild(card);
        }

        // Auto-expand if only one result, or if current session matches
        const cards = heartbeatBody.querySelectorAll(".hb-card");
        if (cards.length === 1) {
          cards[0].querySelector(".hb-card-body").classList.add("open");
          cards[0].querySelector(".hb-card-arrow").classList.add("open");
        } else if (currentSession) {
          for (const c of cards) {
            if (c.querySelector(".hb-card-key").textContent === currentSession) {
              c.querySelector(".hb-card-body").classList.add("open");
              c.querySelector(".hb-card-arrow").classList.add("open");
              break;
            }
          }
        }

        if (!hasAny) {
          heartbeatBody.innerHTML = '<div class="heartbeat-empty">No heartbeat items</div>';
        }
      });

      // ── Modal close handlers ───────────────────────────────

      function closeModal(modalEl) {
        modalEl.classList.remove("open");
      }

      configClose.addEventListener("click", () => closeModal(configModal));
      heartbeatClose.addEventListener("click", () => closeModal(heartbeatModal));

      configModal.addEventListener("click", (e) => {
        if (e.target === configModal) closeModal(configModal);
      });

      heartbeatModal.addEventListener("click", (e) => {
        if (e.target === heartbeatModal) closeModal(heartbeatModal);
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeModal(configModal);
          closeModal(heartbeatModal);
        }
      });

      // ── Init ───────────────────────────────────────────────

      connectWS();
      loadSessions();

      // Auto-refresh session list every 30s
      sessionRefreshTimer = setInterval(loadSessions, 30000);
    </script>
  </body>
</html>
