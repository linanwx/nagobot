<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nagobot Dashboard</title>
    <style>
      :root {
        --bg-deep: #080c14;
        --bg-base: #0c1221;
        --bg-surface: #111827;
        --bg-elevated: #1a2332;
        --border: #1e293b;
        --border-active: #334155;

        --text-primary: #e2e8f0;
        --text-secondary: #94a3b8;
        --text-tertiary: #64748b;

        --accent-green: #10b981;
        --accent-amber: #f59e0b;
        --accent-blue: #3b82f6;
        --accent-red: #ef4444;
        --accent-purple: #8b5cf6;
        --accent-cyan: #06b6d4;

        --role-user: #60a5fa;
        --role-assistant: #34d399;
        --role-system: #fbbf24;
        --role-tool: #a78bfa;

        --font-mono: "IBM Plex Mono", "JetBrains Mono", "SF Mono", "Cascadia Code", monospace;
        --font-sans: "IBM Plex Sans", "Inter", system-ui, sans-serif;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body { height: 100%; overflow: hidden; }

      body {
        font-family: var(--font-mono);
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 13px;
        line-height: 1.5;
        position: relative;
      }

      /* Scan-line overlay */
      body::after {
        content: "";
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: 9999;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px
        );
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

      /* Layout */
      .app {
        display: grid;
        grid-template-rows: 44px 1fr;
        height: 100dvh;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background: var(--bg-base);
        border-bottom: 1px solid var(--border);
        z-index: 10;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        font-family: var(--font-sans);
        font-weight: 700;
        font-size: 15px;
        color: var(--text-primary);
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .logo-bar {
        width: 3px;
        height: 18px;
        background: var(--accent-green);
        border-radius: 1px;
      }

      .conn-status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-tertiary);
        font-family: var(--font-sans);
      }

      .conn-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent-red);
      }

      .conn-dot.connected {
        background: var(--accent-green);
        box-shadow: 0 0 6px var(--accent-green);
        animation: pulse-glow 2s ease-in-out infinite;
      }

      .conn-dot.reconnecting {
        background: var(--accent-amber);
        animation: pulse-glow 1s ease-in-out infinite;
      }

      @keyframes pulse-glow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .header-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-family: var(--font-sans);
        font-size: 12px;
        font-weight: 400;
        transition: all 0.15s;
      }

      .header-btn:hover {
        background: var(--bg-elevated);
        border-color: var(--border-active);
        color: var(--text-primary);
      }

      /* Main area */
      .main {
        display: grid;
        grid-template-columns: var(--sidebar-width, 260px) auto 1fr;
        overflow: hidden;
      }

      .resize-handle {
        width: 4px;
        cursor: col-resize;
        background: transparent;
        transition: background 0.15s;
        position: relative;
        z-index: 5;
      }
      .resize-handle:hover,
      .resize-handle.active {
        background: var(--accent-green);
      }
      .resize-handle::before {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        left: -3px; right: -3px;
      }

      /* Sidebar */
      .sidebar {
        background: var(--bg-base);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-header {
        padding: 12px 14px 8px;
        font-family: var(--font-sans);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--text-tertiary);
      }

      .session-list {
        flex: 1;
        overflow-y: auto;
        padding: 0 6px 6px;
      }

      .session-group {
        margin-bottom: 1px;
      }

      .session-group-header {
        display: flex;
        align-items: flex-start;
        gap: 4px;
        padding: 4px 6px;
        cursor: pointer;
        border-radius: 4px;
        transition: background 0.12s;
        user-select: none;
      }

      .session-group-header:hover {
        background: var(--bg-elevated);
      }

      .session-group-header.has-session:hover {
        background: rgba(52, 211, 153, 0.08);
      }

      .session-group-arrow {
        font-size: 11px;
        color: var(--text-tertiary);
        flex-shrink: 0;
        width: 14px;
        text-align: center;
        line-height: 1.4;
      }

      .session-group-content {
        flex: 1;
        min-width: 0;
      }

      .session-group-title-row {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .session-group-name {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-secondary);
        font-family: var(--font-sans);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        min-width: 0;
      }

      /* Top-level group names uppercase */
      .session-group-header[data-depth="0"] .session-group-name {
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .session-group-meta {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-shrink: 0;
      }

      .session-group-count {
        font-size: 9px;
        color: var(--text-tertiary);
      }

      .session-group-msg-count {
        font-size: 9px;
        color: var(--text-tertiary);
        background: var(--bg-surface);
        padding: 1px 5px;
        border-radius: 8px;
      }

      .session-group-time {
        font-size: 9px;
        color: var(--text-tertiary);
      }

      .session-group-children {
        padding-left: 8px;
      }

      .session-group.collapsed .session-group-children {
        display: none;
      }

      .session-group-header.active {
        background: var(--bg-elevated);
      }

      .session-group-header.active .session-group-name {
        color: var(--accent-green);
      }

      .session-item {
        display: flex;
        align-items: flex-start;
        gap: 4px;
        padding: 4px 6px;
        margin-bottom: 1px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.12s;
        user-select: none;
      }

      .session-item:hover {
        background: rgba(52, 211, 153, 0.08);
      }

      .session-item.active {
        background: var(--bg-elevated);
      }

      .session-item-spacer {
        width: 14px;
        flex-shrink: 0;
      }

      .session-item-content {
        flex: 1;
        min-width: 0;
      }

      .session-item-title-row {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .header-btn.hb-active {
        color: var(--accent-red);
        border-color: var(--accent-red);
      }
      .header-btn.hb-active:hover {
        color: var(--accent-red);
      }

      .session-key {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-secondary);
        font-family: var(--font-sans);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        min-width: 0;
      }

      .session-item.active .session-key {
        color: var(--accent-green);
      }

      .session-summary {
        font-size: 9px;
        color: var(--text-tertiary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        line-height: 1.3;
      }

      .session-meta {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-shrink: 0;
      }

      .session-count {
        font-size: 9px;
        color: var(--text-tertiary);
        background: var(--bg-surface);
        padding: 1px 5px;
        border-radius: 8px;
      }

      .session-time {
        font-size: 9px;
        color: var(--text-tertiary);
      }

      .session-skeleton {
        height: 36px;
        margin: 2px 0;
        border-radius: 4px;
        background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-elevated) 50%, var(--bg-surface) 75%);
        background-size: 200% 100%;
        animation: skeleton-shimmer 1.5s ease-in-out infinite;
      }

      @keyframes skeleton-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Inspector area */
      .inspector {
        display: grid;
        grid-template-rows: 36px 1fr auto;
        overflow: hidden;
        background: var(--bg-deep);
      }

      .inspector-header {
        display: flex;
        align-items: center;
        padding: 0 16px;
        background: var(--bg-base);
        border-bottom: 1px solid var(--border);
        font-size: 11px;
        color: var(--text-tertiary);
        gap: 8px;
      }

      .inspector-header-label {
        font-family: var(--font-sans);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        font-size: 10px;
      }

      .inspector-header-session {
        color: var(--text-secondary);
        font-family: var(--font-mono);
      }

      .stats-bar {
        display: none;
        align-items: center;
        gap: 12px;
        padding: 4px 16px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        font-size: 10px;
        color: var(--text-tertiary);
        font-family: var(--font-mono);
        flex-wrap: wrap;
      }
      .stats-bar.visible { display: flex; }
      .stats-item { white-space: nowrap; }
      .stats-label { color: var(--text-tertiary); margin-right: 3px; }
      .stats-value { color: var(--text-secondary); }
      .stats-bar-fill {
        height: 4px;
        border-radius: 2px;
        background: var(--border);
        flex: 1;
        min-width: 60px;
        overflow: hidden;
        position: relative;
      }
      .stats-bar-progress {
        height: 100%;
        border-radius: 2px;
        transition: width 0.3s;
      }
      .stats-bar-progress.ok { background: var(--accent-green); }
      .stats-bar-progress.warning { background: #d97706; }
      .stats-bar-progress.pressure { background: #ef4444; }
      .stats-bar-tick {
        position: absolute;
        top: 0;
        width: 1px;
        height: 100%;
        opacity: 0.85;
        pointer-events: auto;
      }
      .stats-bar-tick.tier2 { background: #d97706; }
      .stats-bar-tick.tier3 { background: #ef4444; }
      .stats-bar-tick::before {
        content: "";
        position: absolute;
        left: -4px;
        right: -4px;
        top: -2px;
        bottom: -2px;
      }
      .stats-not-running {
        color: var(--text-tertiary);
        font-style: italic;
        font-size: 10px;
      }

      /* Token Breakdown */
      .token-breakdown {
        display: none;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        font-size: 10px;
        font-family: var(--font-mono);
      }
      .token-breakdown.visible { display: block; }
      .token-breakdown-toggle {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 3px 16px;
        cursor: pointer;
        color: var(--text-tertiary);
        user-select: none;
        font-size: 10px;
        font-family: var(--font-mono);
        background: none;
        border: none;
        width: 100%;
        text-align: left;
      }
      .token-breakdown-toggle:hover { color: var(--text-secondary); }
      .token-breakdown-content {
        display: none;
        padding: 4px 16px 8px;
      }
      .token-breakdown-content.open { display: block; }
      .token-breakdown-section {
        margin-bottom: 6px;
      }
      .token-breakdown-section:last-child { margin-bottom: 0; }
      .token-breakdown-section-title {
        color: var(--text-tertiary);
        text-transform: uppercase;
        font-size: 9px;
        letter-spacing: 0.5px;
        margin-bottom: 3px;
      }
      .token-breakdown-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 1px 0;
      }
      .token-breakdown-name {
        color: var(--text-secondary);
        min-width: 70px;
        flex-shrink: 0;
      }
      .token-breakdown-tokens {
        color: var(--text-tertiary);
        min-width: 45px;
        text-align: right;
        flex-shrink: 0;
      }
      .token-breakdown-pct {
        color: var(--text-tertiary);
        min-width: 35px;
        text-align: right;
        flex-shrink: 0;
      }
      .token-breakdown-bar-bg {
        height: 3px;
        border-radius: 1.5px;
        background: var(--border);
        flex: 1;
        min-width: 30px;
        overflow: hidden;
      }
      .token-breakdown-bar-fill {
        height: 100%;
        border-radius: 1.5px;
      }
      .compression-stat {
        display: flex;
        gap: 12px;
        padding: 1px 0;
        color: var(--text-secondary);
      }
      .compression-stat .cs-label { color: var(--text-tertiary); }

      /* Messages */
      .messages {
        overflow-y: auto;
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .messages-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-tertiary);
        font-size: 13px;
      }

      .load-older-btn {
        padding: 8px 16px;
        text-align: center;
        color: var(--accent-blue);
        font-size: 12px;
        cursor: pointer;
        border: 1px dashed var(--border);
        border-radius: 4px;
        margin-bottom: 4px;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .load-older-btn:hover {
        background: var(--bg-elevated);
      }

      .msg-card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        border-left: 3px solid var(--border);
        overflow: hidden;
        flex-shrink: 0;
      }

      .msg-card[data-role="user"] { border-left-color: var(--role-user); }
      .msg-card[data-role="assistant"] { border-left-color: var(--role-assistant); }
      .msg-card[data-role="system"] { border-left-color: var(--role-system); }
      .msg-card[data-role="tool"] { border-left-color: var(--role-tool); }

      .msg-card.heartbeat-trim {
        opacity: 0.35;
      }

      .heartbeat-trim-badge {
        font-size: 9px;
        color: var(--accent-red);
        background: rgba(239, 68, 68, 0.1);
        padding: 1px 5px;
        border-radius: 3px;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      .msg-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: var(--bg-elevated);
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }

      .role-badge {
        font-family: var(--font-sans);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 1px 7px;
        border-radius: 3px;
        color: #fff;
      }

      .role-badge.user { background: var(--role-user); color: #0c1221; }
      .role-badge.assistant { background: var(--role-assistant); color: #0c1221; }
      .role-badge.system { background: var(--role-system); color: #0c1221; }
      .role-badge.tool { background: var(--role-tool); color: #0c1221; }

      .msg-timestamp {
        font-size: 11px;
        color: var(--text-tertiary);
      }

      .source-badge {
        font-size: 10px;
        color: var(--accent-cyan);
        background: rgba(6, 182, 212, 0.1);
        padding: 1px 6px;
        border-radius: 3px;
        border: 1px solid rgba(6, 182, 212, 0.2);
      }

      .tool-name-badge {
        font-size: 10px;
        color: var(--accent-purple);
        background: rgba(139, 92, 246, 0.1);
        padding: 1px 6px;
        border-radius: 3px;
        border: 1px solid rgba(139, 92, 246, 0.2);
      }

      .msg-id {
        font-size: 10px;
        color: var(--text-tertiary);
        margin-left: auto;
        cursor: default;
        white-space: nowrap;
      }

      .compressed-badge {
        font-size: 9px;
        color: var(--accent-amber);
        background: rgba(245, 158, 11, 0.1);
        padding: 1px 5px;
        border-radius: 3px;
        border: 1px solid rgba(245, 158, 11, 0.2);
        cursor: pointer;
      }

      .compressed-badge:hover {
        background: rgba(245, 158, 11, 0.2);
      }
      .token-badge {
        font-size: 9px;
        color: var(--text-tertiary);
        margin-left: auto;
        white-space: nowrap;
        padding-left: 6px;
      }
      .tok-low { color: #6b7280; }
      .tok-mid { color: #d97706; }
      .tok-high { color: #ef4444; }
      .tok-huge { color: #c084fc; font-weight: 600; }

      .msg-body {
        padding: 8px 10px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 1.55;
        color: var(--text-primary);
      }

      .msg-body-truncated {
        max-height: 300px;
        overflow: hidden;
        position: relative;
      }

      .msg-body-truncated::after {
        content: "";
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 40px;
        background: linear-gradient(transparent, var(--bg-surface));
        pointer-events: none;
      }

      .show-more-btn {
        display: block;
        width: 100%;
        padding: 4px;
        background: var(--bg-elevated);
        border: none;
        border-top: 1px solid var(--border);
        color: var(--text-secondary);
        font-size: 11px;
        font-family: var(--font-sans);
        cursor: pointer;
        transition: color 0.12s;
      }

      .show-more-btn:hover {
        color: var(--text-primary);
      }

      /* Wake XML display */
      .wake-view {
        font-size: 12px;
      }

      .wake-fields {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 2px 12px;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 6px;
      }

      .wake-label {
        color: var(--text-tertiary);
        font-family: var(--font-sans);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding-top: 1px;
      }

      .wake-value {
        color: var(--text-secondary);
        font-size: 12px;
      }

      .wake-message {
        color: var(--text-primary);
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* Collapsible sections */
      .collapsible {
        border-top: 1px solid var(--border);
      }

      .collapsible-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        width: 100%;
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 11px;
        font-family: var(--font-sans);
        cursor: pointer;
        transition: color 0.12s;
      }

      .collapsible-toggle:hover {
        color: var(--text-primary);
      }

      .collapsible-arrow {
        font-size: 9px;
        transition: transform 0.2s;
        display: inline-block;
      }

      .collapsible.open .collapsible-arrow {
        transform: rotate(90deg);
      }

      .collapsible-badge {
        display: inline-block;
        padding: 1px 6px;
        margin-left: 6px;
        font-size: 10px;
        line-height: 1.4;
        border-radius: 3px;
        background: var(--border);
        color: var(--text-secondary);
      }

      .collapsible-badge.trimmed {
        background: #b98a2c22;
        color: #b98a2c;
      }

      .collapsible-body {
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        transition: max-height 0.25s ease, opacity 0.2s ease;
      }

      .collapsible.open .collapsible-body {
        max-height: 2000px;
        opacity: 1;
      }

      .collapsible-content {
        padding: 6px 10px 8px;
        font-size: 12px;
        color: var(--text-secondary);
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* Tool calls */
      .tool-call-item {
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
      }

      .tool-call-item:last-child {
        border-bottom: none;
      }

      .tool-call-name {
        font-size: 11px;
        font-weight: 600;
        color: var(--accent-amber);
        margin-bottom: 4px;
      }

      .tool-call-args {
        font-size: 11px;
        color: var(--text-secondary);
        white-space: pre-wrap;
        word-break: break-word;
        background: var(--bg-deep);
        padding: 6px 8px;
        border-radius: 3px;

  <body>
    <div class="app">
      <!-- Header -->
      <div class="header">

    <!-- Config Modal -->

        </div>
        <div class="modal-body" id="heartbeatBody">Loading...</div>
