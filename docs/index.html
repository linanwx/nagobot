<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nagobot — AI Bot Framework</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { max-width: 640px; text-align: center; }
  h1 { font-size: 3rem; margin-bottom: 0.5rem; }
  .tagline { font-size: 1.2rem; color: #8b949e; margin-bottom: 2.5rem; }
  .install-block { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; text-align: left; }
  .install-block .label { font-size: 0.85rem; color: #8b949e; margin-bottom: 0.5rem; }
  .install-block code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.95rem; color: #7ee787; word-break: break-all; }
  .links { margin-top: 2rem; }
  .links a { color: #58a6ff; text-decoration: none; margin: 0 1rem; }
  .links a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>nagobot</h1>
  <p class="tagline">AI bot framework with multi-channel support</p>

  <div class="install-block">
    <div class="label">macOS / Linux</div>
    <code>curl -fsSL https://nagobot.com/install.sh | bash</code>
  </div>

  <div class="install-block">
    <div class="label">Windows (PowerShell)</div>
    <code>irm https://nagobot.com/install.ps1 | iex</code>
  </div>

  <div class="links">
    <a href="https://github.com/linanwx/nagobot">GitHub</a>
    <a href="https://github.com/linanwx/nagobot/releases">Releases</a>
  </div>
</div>
</body>
</html>
