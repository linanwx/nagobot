name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X github.com/linanwx/nagobot/cmd.Version=${VERSION}"
          for pair in linux/amd64 linux/arm64 windows/amd64; do
            GOOS="${pair%/*}"
            GOARCH="${pair#*/}"
            OUT="nagobot-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then OUT="${OUT}.exe"; fi
            echo "Building ${OUT}..."
            GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags="$LDFLAGS" -o "$OUT" .
          done
          sha256sum nagobot-* > checksums.txt

      - name: Create Release
        run: gh release create "${{ github.ref_name }}" nagobot-* checksums.txt --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        if: env.TAP_TOKEN != ''
        run: |
          VERSION="${GITHUB_REF_NAME}"
          REVISION="${GITHUB_SHA}"
          git clone https://x-access-token:${TAP_TOKEN}@github.com/linanwx/homebrew-nagobot.git /tmp/tap
          cd /tmp/tap
          cat > Formula/nagobot.rb << FORMULA
          class Nagobot < Formula
            desc "AI bot framework with multi-channel support"
            homepage "https://github.com/linanwx/nagobot"
            url "https://github.com/linanwx/nagobot.git",
                tag:      "${VERSION}",
                revision: "${REVISION}"
            license "MIT"

            depends_on "go" => :build

            def install
              ldflags = "-X github.com/linanwx/nagobot/cmd.Version=#{version}"
              system "go", "build", *std_go_args(ldflags: ldflags)
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/nagobot --version")
            end
          end
          FORMULA
          sed -i 's/^          //' Formula/nagobot.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nagobot.rb
          git commit -m "Update nagobot to ${VERSION}" || true
          git push
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
