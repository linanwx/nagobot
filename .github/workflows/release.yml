name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X github.com/linanwx/nagobot/cmd.Version=${VERSION}"
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${pair%/*}"
            GOARCH="${pair#*/}"
            OUT="nagobot-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then OUT="${OUT}.exe"; fi
            echo "Building ${OUT}..."
            GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags="$LDFLAGS" -o "$OUT" .
          done
          sha256sum nagobot-* > checksums.txt

      - name: Create Release
        run: gh release create "${{ github.ref_name }}" nagobot-* checksums.txt --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

